<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Ebenezzer - Livros que edificam • Fé que transforma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
        <h1>
            <img src="background.jpg" alt="Logo Ebenezzer" class="header-logo-img">
            Loja Ebenezzer
        </h1>
        <p>LIVROS QUE EDIFICAM • FÉ QUE TRANSFORMA</p>
    </header>

    <div class="container">
        <!-- Banner Bíblico de Boas-vindas -->
        <div class="welcome-banner">
            <div class="verse">"Crescei na graça e no conhecimento."</div>
            <div class="reference">2 Pedro 3:18</div>
        </div>

        <!-- NOVO: Campo de Busca Dinâmico -->
        <div class="search-container" style="margin-bottom: 1.2rem;">
            <input type="text" id="search-input" placeholder="Buscar produto por nome ou código..." oninput="searchProducts()">
        </div>

        <!-- Filtros de Categorias -->
        <div class="categories-container" id="categories-container">
            <button class="category-btn active" onclick="filterProducts('Todos')">Todos</button>
        </div>

        <!-- Grid de Produtos -->
        <div class="products-grid" id="products-grid"></div>
    </div>

    <!-- Botão Flutuante do Carrinho -->
    <div class="floating-cart" onclick="toggleCart()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l1.313 7h8.17l1.313-7H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
        </svg>
        <span class="cart-count" id="cart-count">0</span>
    </div>

    <!-- Gaveta do Carrinho -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Seu Carrinho</h2>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>

        <div class="cart-items" id="cart-items"></div>

        <div class="cart-footer">
            <div class="cart-actions-group">
                <button class="btn-secondary-cart" onclick="toggleCart()">Continuar Comprando</button>
                <button class="btn-danger-cart" onclick="clearCart()">Esvaziar Carrinho</button>
            </div>

            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>

            <!-- Dados para Entrega (Substituído no checkout-form) -->
            <form class="checkout-form" id="checkout-form" onsubmit="sendWhatsAppOrder(event)">
                <input type="text" id="cust-name" placeholder="Nome Completo" required>
                <!-- NOVO CAMPO: WhatsApp do Cliente -->
                <input type="tel" id="cust-phone" placeholder="Celular / WhatsApp (com DDD)" required>
                <select id="cust-payment" required>
                    <option value="" disabled selected>Escolha o Pagamento</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
                <button type="submit" class="checkout-btn">
                    Finalizar Compra
                </button>
            </form>

    <script src="app.js"></script>
    <!-- Biblioteca Principal do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <!-- Biblioteca do Cloud Firestore -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Configuração do seu banco de dados -->
    <script src="firebase-config.js"></script>
    
</body>
</html>
